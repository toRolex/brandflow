name: 功能建议
description: 为项目提出一个新功能或改进建议
title: "[Feature] "
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请尽量清晰地描述你想要的能力和场景。

  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 这个功能解决什么痛点？在什么场景下需要？
      placeholder: 当我在做 X 操作时，需要 Y 能力来完成工作流...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你希望这个功能怎么工作？
      placeholder: 可以在 X 页面新增一个 Y 按钮，点击后实现 Z 效果...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些其他实现方式？
      placeholder: 也可以通过在 X 处加配置来实现类似效果...

  - type: dropdown
    id: area
    attributes:
      label: 影响模块
      description: 这个建议主要影响哪个模块？
      options:
        - control-plane
        - runtime-worker
        - script-service
        - tts-service
        - video-service
        - asset-library
        - frontend
        - knowledge-store
        - deployment
        - docs
        - 不确定
    validations:
      required: true

  - type: checkboxes
    id: context
    attributes:
      label: 确认
      options:
        - label: 我已搜索现有 issue，未找到重复建议
          required: true
