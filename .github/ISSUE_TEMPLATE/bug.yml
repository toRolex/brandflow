name: Bug 报告
description: 提交一个 bug 帮助改进项目
title: "[Bug] "
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交 bug！请尽量提供以下信息帮助我们复现和定位问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述这个 bug 是什么
      placeholder: 运行 X 命令时，预期 Y 但实际发生了 Z...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现这个 bug？请提供具体命令或操作路径
      placeholder: |
        1. 运行 `uv run python -m apps.control_plane`
        2. 打开 http://localhost:17890
        3. 点击 "X" 按钮
        4. 看到报错
      value: "1.\n2.\n3.\n"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你觉得应该发生什么？
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / 日志
      description: 如有，附上截图、错误日志或控制台输出
      render: shell

  - type: input
    id: os
    attributes:
      label: 运行环境
      description: 操作系统和版本
      placeholder: macOS 15.x / Windows Server 2022
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python 版本
      placeholder: "3.11"
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: 影响模块
      description: 这个 bug 属于哪个模块？
      options:
        - control-plane
        - runtime-worker
        - script-service
        - tts-service
        - video-service
        - asset-library
        - frontend
        - deployment
        - 不确定
    validations:
      required: true

  - type: checkboxes
    id: context
    attributes:
      label: 确认
      options:
        - label: 我已搜索现有 issue，未找到重复
          required: true
