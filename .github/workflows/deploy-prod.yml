name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: windows-prod
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        shell: cmd
        run: |
          xcopy /y /e /q "%CD%\*" "D:\brandflow\" >nul
          cd /d D:\brandflow
          call packaging\windows\deploy.bat
