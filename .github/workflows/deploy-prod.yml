name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: windows-prod
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        shell: cmd
        run: |
          cd /d D:\brandflow
          git pull origin main
          call packaging\windows\deploy.bat
