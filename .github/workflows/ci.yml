name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Install ty
        run: uv tool install ty --force

      - name: Type check
        run: uv run ty check

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Run tests
        run: uv run pytest tests/ -q --tb=short -m "not e2e and not slow and not media_integration"

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: frontend/node_modules/.vite
          key: vite-${{ hashFiles('frontend/pnpm-lock.yaml', 'frontend/src/**/*.ts', 'frontend/src/**/*.tsx') }}
          restore-keys: |
            vite-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Biome lint
        run: pnpm biome lint src/ --diagnostic-level=error
        working-directory: frontend

      - name: Biome format check
        run: pnpm biome format src/
        working-directory: frontend

      - name: Test
        run: pnpm test
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend
