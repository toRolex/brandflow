name: Issue Triage

on:
  issues:
    types: [opened, reopened, labeled]

jobs:
  auto-triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check for existing triage labels
        id: check_labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const triageLabels = ['needs-triage', 'ready-for-agent', 'ready-for-human', 'needs-info', 'wontfix'];
            const hasTriageLabel = issue.labels.some(label => triageLabels.includes(label.name));
            core.setOutput('has_triage_label', hasTriageLabel.toString());

      - name: Apply needs-triage label
        if: steps.check_labels.outputs.has_triage_label != 'true'
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: needs-triage

      - name: Remove needs-triage when final label is set (labeled event)
        if: github.event.action == 'labeled' && (github.event.label.name == 'ready-for-agent' || github.event.label.name == 'ready-for-human' || github.event.label.name == 'needs-info' || github.event.label.name == 'wontfix')
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const hasNeedsTriage = issue.labels.some(label => label.name === 'needs-triage');
            if (hasNeedsTriage) {
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'needs-triage'
              });
            }

      - name: Add triage comment
        if: steps.check_labels.outputs.has_triage_label != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "感谢提交 issue 🙌 已进入 triage 流程。",
              "",
              "**接下来会发生什么：**",
              "- 维护者会尽快评估这个 issue",
              "- 如果信息不足，可能会打上 `needs-info` 标签并等待补充",
              "- 评估完成后会标记为 `ready-for-agent` 或 `ready-for-human`",
              "",
              "作为提交者，你可以通过更新 issue body 来补充更多上下文。"
            ].join("\n");

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
