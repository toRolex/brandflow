name: Deploy Test

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: windows-test
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Run deploy script
        shell: cmd
        run: |
          echo PATH=%PATH%
          where uv
          where pnpm
          where nssm
          set PATH=C:\Users\ziyua\.local\bin;C:\Users\ziyua\AppData\Roaming\npm;%PATH%
          echo PATH_AFTER=%PATH%
          where uv
          packaging\windows\deploy.bat
        working-directory: ${{ github.workspace }}
