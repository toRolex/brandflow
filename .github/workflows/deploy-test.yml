name: Deploy Test

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: windows-test
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup PATH for tools
        shell: cmd
        run: |
          echo C:\Users\ziyua\.local\bin>>%GITHUB_PATH%
          echo C:\Users\ziyua\AppData\Roaming\npm>>%GITHUB_PATH%

      - name: Run deploy script
        shell: cmd
        run: packaging\windows\deploy.bat
        working-directory: ${{ github.workspace }}
