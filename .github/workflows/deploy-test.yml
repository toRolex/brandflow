name: Deploy Test

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: windows-test
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install tools into workspace
        shell: cmd
        run: |
          curl -L -o tools\uv.zip https://github.com/astral-sh/uv/releases/download/0.11.25/uv-x86_64-pc-windows-msvc.zip
          tar -xf tools\uv.zip -C tools
          npm install --prefix tools pnpm

      - name: Fix lockfile for pnpm 11
        shell: cmd
        run: |
          set PATH=%CD%\tools;%CD%\tools\node_modules\.bin;%PATH%
          cd frontend
          pnpm install --fix-lockfile --no-frozen-lockfile

      - name: Run deploy script
        shell: cmd
        run: |
          set PATH=%CD%\tools;%CD%\tools\node_modules\.bin;%PATH%
          echo PWD=%CD%
          echo PWD_DRIVE=%CD:~0,2%
          packaging\windows\deploy.bat
        working-directory: ${{ github.workspace }}
