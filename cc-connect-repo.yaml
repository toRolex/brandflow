                - paragraph [ref=e1568]:
                  - text: Project configs rotate to a fresh session automatically after long inactivity. This prevents "context drift" where stale chat history (failed commands, debugging noise) is repeatedly re-ingested via
                  - code [ref=e1569]: "--continue"
                  - text: and starts to dominate the model's attention. The previous session is preserved and remains accessible via
                  - code [ref=e1570]: /list
                  - text: and
                  - code [ref=e1571]: /switch
                  - text: .
                - generic [ref=e1572]:
                  - generic [ref=e1573]:
                    - text: "[[projects]] reset_on_idle_mins = 30"
                    - generic [ref=e1574]: "# default when unset; set to 0 to disable"
                  - button "Copy code to clipboard" [ref=e1576] [cursor=pointer]:
                    - img [ref=e1577]
                - paragraph [ref=e1580]:
                  - text: The default is
                  - strong [ref=e1581]: 30 minutes
                  - text: when unset. Set
                  - code [ref=e1582]: reset_on_idle_mins = 0
                  - text: to opt out and always continue the previous session.
                - generic [ref=e1583]:
                  - heading "🛡️ OS-User Isolation (run_as_user)" [level=3] [ref=e1584]:
                    - text: 🛡️ OS-User Isolation (
                    - code [ref=e1585]: run_as_user
