                    - img [ref=e1587]
                - paragraph [ref=e1589]: On Linux/macOS, a project can spawn its agent under a different Unix user for OS-level file-system isolation from the supervisor user that runs cc-connect. Currently supported by Claude Code.
                - generic [ref=e1590]:
                  - generic [ref=e1591]:
                    - text: "[[projects]] name ="
                    - generic [ref=e1592]: "\"claude-sandboxed\""
                    - text: run_as_user =
                    - generic [ref=e1593]: "\"partseeker-coder\""
                    - text: run_as_env = [
                    - generic [ref=e1594]: "\"PGSSLROOTCERT\""
                    - text: "]"
                  - button "Copy code to clipboard" [ref=e1596] [cursor=pointer]:
                    - img [ref=e1597]
                - paragraph [ref=e1600]:
                  - text: The target user needs passwordless sudo from the supervisor, no sudo of its own, read+write on
                  - code [ref=e1601]: work_dir
                  - text: ", and its own"
                  - code [ref=e1602]: ~/.claude/settings.json
                  - text: with whatever credentials the agent uses. If you authenticate via
                  - code [ref=e1603]: claude.ai
                  - text: OAuth, symlink the target user's
                  - code [ref=e1604]: ~/.claude/.credentials.json
                  - text: to the supervisor's copy so token refresh stays in sync — see the
                  - link "environment propagation checklist" [ref=e1605] [cursor=pointer]:
                    - /url: /chenhg5/cc-connect/blob/main/docs/usage.md#environment-propagation-what-moves-into-the-target-users-home
                  - text: for details. See
                  - link "docs/usage.md" [ref=e1606] [cursor=pointer]:
                    - /url: /chenhg5/cc-connect/blob/main/docs/usage.md#running-agents-as-a-different-unix-user-run_as_user
                    - code [ref=e1607]: docs/usage.md
                  - text: for the full setup.
                - paragraph [ref=e1608]: "Before starting cc-connect, audit the setup with:"
                - generic [ref=e1609]:
                  - generic [ref=e1610]: cc-connect doctor user-isolation
                  - button "Copy code to clipboard" [ref=e1612] [cursor=pointer]:
                    - img [ref=e1613]
