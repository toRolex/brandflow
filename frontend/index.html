<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Brandflow</title>
    <script>
      (function() {
        var t = localStorage.getItem("bf-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
        var l = localStorage.getItem("bf-layout");
        if (l === "compact") {
          document.documentElement.setAttribute("data-layout", l);
        }
      })();
    </script>
  </head>
  <body style="background: var(--bg-page); color: var(--text-primary); -webkit-font-smoothing: antialiased;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
