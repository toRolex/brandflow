{% extends "layout.html" %}
{% block body %}
<section>
  <h1>系统配置</h1>
  <p>按能力维度管理 provider 选择与参数。</p>
</section>

<section id="config-app"></section>

<script>
  window.__configPayload = null;
  window.__configOptions = null;
  const CLEAR_SECRET_SENTINEL = "__CLEAR__";

  const sectionOrder = ["llm", "tts", "text_to_image", "image_to_video", "vision"];
  const sectionLabels = {
    llm: "LLM",
    tts: "TTS",
    text_to_image: "Text to Image",
    image_to_video: "Image to Video",
    vision: "Vision",
  };

  async function loadConfigPage() {
    const [configResponse, optionsResponse] = await Promise.all([
      fetch("/api/config"),
      fetch("/api/config/options"),
    ]);

    if (!configResponse.ok || !optionsResponse.ok) {
      alert("加载配置失败");
      return;
    }

    window.__configPayload = await configResponse.json();
    window.__configOptions = await optionsResponse.json();
    renderConfig();
  }

  function renderConfig() {
    const container = document.getElementById("config-app");
    const payload = window.__configPayload || { providers: {} };
    const options = window.__configOptions || { providers: {} };

    container.innerHTML = "";

    sectionOrder.forEach((sectionName) => {
      const sectionPayload = payload.providers?.[sectionName] || { selected: "", providers: {} };
      const sectionOptions = options.providers?.[sectionName] || { providers: {} };
      container.appendChild(renderSection(sectionName, sectionPayload, sectionOptions));
    });
  }

  function renderSection(sectionName, sectionPayload, sectionOptions) {
    const card = document.createElement("section");
    card.className = "config-card";
    card.style.background = "#eff2f5";
    card.style.border = "1px solid #393f46";
    card.style.borderRadius = "12px";
    card.style.padding = "16px";
    card.style.marginBottom = "24px";

    const heading = document.createElement("h2");
    heading.textContent = sectionLabels[sectionName] || sectionName;
    card.appendChild(heading);

    const form = document.createElement("form");
    form.dataset.section = sectionName;
    form.style.display = "grid";
    form.style.gap = "16px";
    form.addEventListener("submit", onSaveSection);

    const selected = sectionPayload.selected || "";
    const providerEntries = Object.entries(sectionOptions.providers || {});

    const providerField = document.createElement("label");
    providerField.style.display = "grid";
    providerField.style.gap = "8px";
    providerField.innerHTML = '<span>Provider</span>';
    const providerSelect = document.createElement("select");
    providerSelect.name = "selected";
    providerSelect.style.padding = "8px 12px";
    providerSelect.style.border = "1px solid #393f46";
    providerSelect.style.borderRadius = "12px";
    providerSelect.style.background = "#ffffff";
    providerSelect.addEventListener("change", () => {
      const nextSection = window.__configPayload.providers[sectionName];
      nextSection.selected = providerSelect.value;
      renderConfig();
    });

    const emptyOption = document.createElement("option");
    emptyOption.value = "";
    emptyOption.textContent = "未选择";
    providerSelect.appendChild(emptyOption);

    providerEntries.forEach(([providerName, providerOption]) => {
      const option = document.createElement("option");
      option.value = providerName;
      option.textContent = providerOption.label || providerName;
      option.selected = providerName === selected;
      providerSelect.appendChild(option);
    });
    providerField.appendChild(providerSelect);
    form.appendChild(providerField);

    const fieldsWrap = document.createElement("div");
    fieldsWrap.style.display = "grid";
    fieldsWrap.style.gap = "16px";

    const selectedOption = sectionOptions.providers?.[selected];
    const selectedValues = sectionPayload.providers?.[selected] || {};
    (selectedOption?.fields || []).forEach((field) => {
      fieldsWrap.appendChild(renderInputField(field, selectedValues));
    });

    if (!selectedOption) {
      const hint = document.createElement("p");
      hint.textContent = "当前 section 暂无可配置 provider。";
      hint.style.color = "#59636e";
      fieldsWrap.appendChild(hint);
    }

    form.appendChild(fieldsWrap);

    const actions = document.createElement("div");
    const submit = document.createElement("button");
    submit.type = "submit";
    submit.textContent = "保存";
    submit.style.background = "#0969da";
    submit.style.color = "#ffffff";
    submit.style.border = "1px solid #0969da";
    submit.style.borderRadius = "12px";
    submit.style.padding = "8px 16px";
    actions.appendChild(submit);
    form.appendChild(actions);

    card.appendChild(form);
    return card;
  }

  function renderInputField(field, values) {
    const wrapper = document.createElement("label");
    wrapper.style.display = "grid";
    wrapper.style.gap = "8px";

    const labelRow = document.createElement("div");
    labelRow.style.display = "flex";
    labelRow.style.alignItems = "center";
    labelRow.style.gap = "8px";

    const label = document.createElement("span");
    label.textContent = field.label || field.name;
    labelRow.appendChild(label);

    if (field.secret) {
      const clearLabel = document.createElement("label");
      clearLabel.style.display = "inline-flex";
      clearLabel.style.alignItems = "center";
      clearLabel.style.gap = "4px";
      clearLabel.style.color = "#59636e";
      clearLabel.style.fontSize = "12px";

      const clearInput = document.createElement("input");
      clearInput.type = "checkbox";
      clearInput.name = `__clear__${field.name}`;
      clearLabel.appendChild(clearInput);

      const clearText = document.createElement("span");
      clearText.textContent = "清空";
      clearLabel.appendChild(clearText);
      labelRow.appendChild(clearLabel);
    }

    wrapper.appendChild(labelRow);

    let input;
    if (field.kind === "select") {
      input = document.createElement("select");
      (field.options || []).forEach((choice) => {
        const option = document.createElement("option");
        option.value = choice;
        option.textContent = choice;
        input.appendChild(option);
      });
    } else if (field.kind === "json") {
      input = document.createElement("textarea");
      input.rows = 4;
    } else {
      input = document.createElement("input");
      input.type = field.secret ? "password" : "text";
    }

    input.name = field.name;
    input.value = formatFieldValue(field, values[field.name]);
    input.style.padding = "8px 12px";
    input.style.border = "1px solid #393f46";
    input.style.borderRadius = "12px";
    input.style.background = "#ffffff";
    wrapper.appendChild(input);

    return wrapper;
  }

  function formatFieldValue(field, value) {
    if (field.kind === "json" && value && typeof value !== "string") {
      return JSON.stringify(value, null, 2);
    }
    return value || "";
  }

  async function onSaveSection(event) {
    event.preventDefault();
    const form = event.currentTarget;
    const sectionName = form.dataset.section;
    const formData = new FormData(form);
    const selected = String(formData.get("selected") || "");

    const submitPayload = JSON.parse(JSON.stringify(window.__configPayload));
    const sectionPayload = submitPayload.providers[sectionName];
    sectionPayload.selected = selected;

    if (selected) {
      const providerValues = sectionPayload.providers[selected] || {};
      const sectionOptions = window.__configOptions.providers?.[sectionName] || { providers: {} };
      const selectedOption = sectionOptions.providers?.[selected];
      for (const field of selectedOption?.fields || []) {
        if (field.secret && formData.get(`__clear__${field.name}`)) {
          providerValues[field.name] = CLEAR_SECRET_SENTINEL;
          continue;
        }

        const rawValue = String(formData.get(field.name) || "");
        if (field.kind === "json") {
          if (!rawValue.trim()) {
            providerValues[field.name] = "";
            continue;
          }
          try {
            providerValues[field.name] = JSON.parse(rawValue);
          } catch (error) {
            alert("JSON 格式错误");
            return;
          }
          continue;
        }

        providerValues[field.name] = rawValue;
      }
      sectionPayload.providers[selected] = providerValues;
    }

    try {
      const response = await fetch("/api/config", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(submitPayload),
      });

      if (!response.ok) {
        const errorText = await response.text();
        alert(errorText || "保存失败");
        return;
      }

      window.__configPayload = await response.json();
      renderConfig();
    } catch (error) {
      alert("保存失败");
    }
  }

  loadConfigPage();
</script>
{% endblock %}
